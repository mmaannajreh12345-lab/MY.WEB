<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>موسيقاتي — المتجر</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../صفحات CSS/shared.css"/>
  <link rel="stylesheet" href="../صفحات CSS/store.css"/>
</head>
<body>

  <div class="topbar">
    <a class="top-logo" href="../صفحات/index.html">MOSIQATI</a>
    <button class="top-back" onclick="history.back()">
      <span class="top-back-arrow">←</span>
      <span data-ar="رجوع" data-en="Back">رجوع</span>
    </button>
  </div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a class="nav-item" href="../صفحات/index.html">
        <span class="nav-icon">🏠</span>
        <span class="nav-label" data-ar="الرئيسية" data-en="Home">الرئيسية</span>
      </a>
      <a class="nav-item" href="../صفحات/store.html">
        <span class="nav-icon">🛒</span>
        <span class="nav-label" data-ar="المتجر" data-en="Store">المتجر</span>
      </a>
      <a class="nav-item" href="../صفحات/discounts.html">
        <span class="nav-icon">🏷️</span>
        <span class="nav-label" data-ar="الخصومات" data-en="Discounts">الخصومات</span>
      </a>
      <a class="nav-item" href="../صفحات/gifts.html">
        <span class="nav-icon">🎁</span>
        <span class="nav-label" data-ar="الهدايا" data-en="Gifts">الهدايا</span>
      </a>
      <a class="nav-item" href="../صفحات/contact.html">
        <span class="nav-icon">💬</span>
        <span class="nav-label" data-ar="تواصل معنا" data-en="Contact">تواصل معنا</span>
      </a>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-header">
      <h1 data-ar="المتجر" data-en="Store">المتجر</h1>
      <p data-ar="اختر أداتك الموسيقية المفضلة" data-en="Choose your favorite musical instrument">اختر أداتك الموسيقية المفضلة</p>
    </div>

    <!-- صور المنتجات بوسم img مباشرة — المسارات تشير إلى مجلد IMAGES -->
    <div style="display:none">
      <img src="../صور/oud.jpg"    alt="oud"/>
      <img src="../صور/البيانو.jpg"  alt="piano"/>
      <img src="../صور/الجيتار.jpg" alt="guitar"/>
      <img src="../صور/ادوات الاستوديو.jpg" alt="studio"/>
    </div>

    <div class="products-grid" id="store-grid"></div>
  </div>

  <div class="modal-overlay" id="product-modal">
    <div class="modal-box">
      <button class="modal-close" id="modal-close-btn">✕</button>
      <div class="modal-img"     id="modal-img"></div>
      <h3 class="modal-title"    id="modal-title"></h3>
      <p  class="modal-price"    id="modal-price"></p>
      <ul class="modal-features" id="modal-features"></ul>
      <button class="buy-btn-modal" id="modal-buy-btn" data-ar="شراء" data-en="Buy">شراء</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="../ملفات JS/shared.js"></script>
  <script src="../ملفات JS/store.js"></script>
</body>
</html>
