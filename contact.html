        <div class="form-group">
          <label data-ar="رسالتك:" data-en="Your Message:">رسالتك:</label>
          <textarea id="contact-msg" rows="4" data-placeholder-ar="اكتب رسالتك هنا..." data-placeholder-en="Write your message here..." placeholder="اكتب رسالتك هنا..." required></textarea>
